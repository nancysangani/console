name: Card Loading Standard

on:
  schedule:
    # Run nightly at 03:00 UTC
    - cron: '0 3 * * *'
  pull_request:
    paths:
      - 'web/src/components/cards/**'
      - 'web/src/test/card-loading-standard.test.ts'
      - 'web/package.json'
      - 'web/package-lock.json'
  workflow_dispatch:

# Least-privilege: read-only by default; jobs declare write scopes individually
permissions: read-all

jobs:
  card-standard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Run card loading standard tests
        run: npx vitest run src/test/card-loading-standard.test.ts
