name: Playwright Cross-Browser (Nightly)

on:
  schedule:
    - cron: '30 6 * * *'  # 6:30 AM UTC daily
  workflow_dispatch: {}

# Least-privilege: read-only by default; jobs declare write scopes individually
permissions: read-all

concurrency:
  group: playwright-nightly-${{ github.run_id }}
  cancel-in-progress: false

env:
  CI: true

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-build-output
          path: web/dist
          retention-days: 1

  # Cross-browser tests — catches browser-specific regressions in Firefox & WebKit
  # Related issues: #2982 (invisible at certain widths), #2999 (browser widths), #3035 (overlap)
  cross-browser:
    name: Cross-Browser (${{ matrix.browser }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, webkit]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nightly-build-output
          path: web/dist

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Start preview server
        run: |
          npm run preview &
          npx wait-on http://localhost:4173 --timeout 60000

      - name: Run Playwright tests (${{ matrix.browser }})
        run: |
          npx playwright test --project=${{ matrix.browser }} --retries=2 --timeout=60000 \
            e2e/smoke.spec.ts \
            e2e/responsive-regression.spec.ts \
            e2e/spa-routes.spec.ts \
            e2e/Login.spec.ts \
            e2e/Dashboard.spec.ts \
            e2e/Sidebar.spec.ts \
            e2e/Settings.spec.ts \
            e2e/Clusters.spec.ts \
            e2e/Events.spec.ts \
            e2e/Tour.spec.ts \
            e2e/navbar-responsive.spec.ts \
            e2e/custom-dashboard.spec.ts \
            e2e/nightly/rce-vector-scan.spec.ts
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-${{ matrix.browser }}-report
          path: web/playwright-report/
          retention-days: 7

  # Mobile viewport tests — catches responsive layout regressions
  mobile:
    name: Mobile (${{ matrix.project }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        project: [mobile-chrome, mobile-safari]
        include:
          - project: mobile-chrome
            browser: chromium
          - project: mobile-safari
            browser: webkit
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nightly-build-output
          path: web/dist

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Start preview server
        run: |
          npm run preview &
          npx wait-on http://localhost:4173 --timeout 60000

      - name: Run mobile tests
        run: |
          npx playwright test --project=${{ matrix.project }} --retries=2 --timeout=60000 \
            e2e/smoke.spec.ts \
            e2e/responsive-regression.spec.ts \
            e2e/navbar-responsive.spec.ts \
            e2e/Login.spec.ts \
            e2e/Dashboard.spec.ts
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-${{ matrix.project }}-report
          path: web/playwright-report/
          retention-days: 7
