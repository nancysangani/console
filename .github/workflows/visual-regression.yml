name: Visual Regression

on:
  pull_request:
    paths:
      - 'web/src/components/ui/**'
      - 'web/src/index.css'
      - 'web/src/lib/themes.ts'
      - 'web/.storybook/**'
      - 'web/src/**/*.stories.tsx'
      - 'web/e2e/visual/**'
  workflow_dispatch:

# Least-privilege: read-only by default; jobs declare write scopes individually
permissions: read-all

jobs:
  visual-regression:
    if: github.repository == 'kubestellar/console'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Storybook
        run: npm run build-storybook

      - name: Check for existing baselines
        id: baselines
        run: |
          if ls e2e/visual/visual-regression.spec.ts-snapshots/*.png 1>/dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate baseline screenshots (first run)
        if: steps.baselines.outputs.exist == 'false'
        run: npx playwright test --config e2e/visual/visual.config.ts --update-snapshots

      - name: Run visual regression tests
        if: steps.baselines.outputs.exist == 'true'
        run: npx playwright test --config e2e/visual/visual.config.ts

      - name: Upload baseline screenshots
        if: steps.baselines.outputs.exist == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-regression-baselines
          path: web/e2e/visual/visual-regression.spec.ts-snapshots/
          retention-days: 30

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-regression-report
          path: web/e2e/visual-report/
          retention-days: 14

      - name: Upload updated snapshots
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-regression-snapshots
          path: web/e2e/visual/**/*-snapshots/
          retention-days: 14
